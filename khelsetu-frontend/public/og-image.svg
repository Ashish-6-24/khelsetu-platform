<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7F1D1D"/>
      <stop offset="0.5" stop-color="#450A0A"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.15" cy="0.1" r="0.6">
      <stop offset="0" stop-color="#B8860B" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#B8860B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.9" r="0.6">
      <stop offset="0" stop-color="#7F1D1D" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#7F1D1D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#991B1B"/>
      <stop offset="0.5" stop-color="#7F1D1D"/>
      <stop offset="1" stop-color="#450A0A"/>
    </linearGradient>
    <linearGradient id="goldbar" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B8860B"/>
      <stop offset="1" stop-color="#E5B547"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Brand mark -->
  <g transform="translate(100, 110)">
    <rect width="120" height="120" rx="28" fill="url(#mark)"/>
    <rect width="120" height="120" rx="28" fill="url(#bg)" opacity="0.1"/>
    <path d="M40 24h12v32h28V24h12v72h-12V68H52v28H40V24Z" fill="#FAFAF9"/>
  </g>

  <text x="100" y="340" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="84" font-weight="800" letter-spacing="-2" fill="#FAFAF9">KhelSetu</text>

  <text x="100" y="400" font-family="ui-serif, 'Cormorant Garamond', Georgia, serif" font-size="40" font-weight="600" font-style="italic" fill="url(#goldbar)">Run your local tournament like a national one.</text>

  <text x="100" y="450" font-family="ui-sans-serif, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#E2E8F0">Live scoring · Brackets · Broadcast overlays · Built for Nepal</text>

  <!-- Right-side panel -->
  <g transform="translate(700, 110)">
    <rect width="380" height="380" rx="28" fill="rgba(15,23,42,0.5)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <!-- live chip -->
    <rect x="24" y="24" width="80" height="32" rx="16" fill="#DC2626"/>
    <text x="64" y="44" text-anchor="middle" font-family="ui-sans-serif, sans-serif" font-size="13" font-weight="800" fill="#fff" letter-spacing="2">LIVE</text>
    <text x="120" y="44" font-family="ui-sans-serif, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Pokhara vs Kathmandu</text>
    <line x1="24" y1="76" x2="356" y2="76" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

    <text x="40" y="130" font-family="ui-sans-serif, sans-serif" font-size="22" font-weight="600" fill="#E2E8F0">Tigers</text>
    <text x="340" y="130" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="36" font-weight="800" fill="#FAFAF9">142</text>
    <rect x="40" y="145" width="300" height="8" rx="4" fill="#27272A"/>
    <rect x="40" y="145" width="240" height="8" rx="4" fill="url(#goldbar)"/>

    <text x="40" y="200" font-family="ui-sans-serif, sans-serif" font-size="22" font-weight="600" fill="#E2E8F0">Eagles</text>
    <text x="340" y="200" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="36" font-weight="800" fill="#FAFAF9">128</text>
    <rect x="40" y="215" width="300" height="8" rx="4" fill="#27272A"/>
    <rect x="40" y="215" width="190" height="8" rx="4" fill="url(#mark)" opacity="0.8"/>

    <line x1="24" y1="270" x2="356" y2="270" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="40" y="310" font-family="ui-sans-serif, sans-serif" font-size="14" font-weight="600" fill="#94A3B8" letter-spacing="2">DASHARATH STADIUM · KATHMANDU</text>
    <text x="40" y="340" font-family="ui-sans-serif, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">3rd ODI · 12.4 overs</text>
  </g>

  <!-- Footer brand mark -->
  <text x="100" y="560" font-family="ui-sans-serif, sans-serif" font-size="16" font-weight="500" fill="#94A3B8" letter-spacing="1">KHELSETU.APP · CRICKET · FOOTBALL · VOLLEYBALL · BASKETBALL</text>
</svg>
