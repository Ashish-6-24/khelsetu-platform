      as="style"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />

    <title>KhelSetu — Run your local tournament like a national one</title>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script>
      // Zero-flash theme bootstrap. Runs synchronously before React mounts.
      (function () {
        try {
          var stored = localStorage.getItem('khelsetu-theme');
          var theme =
            stored === 'light' || stored === 'dark' || stored === 'system'
              ? stored
              : 'system';
          var prefersDark = window.matchMedia(
            '(prefers-color-scheme: dark)',
          ).matches;
          var isDark = theme === 'dark' || (theme === 'system' && prefersDark);
          document.documentElement.classList.toggle('dark', isDark);
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = isDark
            ? 'dark'
            : 'light';
        } catch (_) {
          /* localStorage may be blocked; fall through to system */
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
