name: Daily Quality Check

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  quality:
    name: Lint, Format, Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: khelsetu-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: khelsetu-frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: khelsetu-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: khelsetu-frontend/package-lock.json
      - run: npm ci
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: khelsetu-frontend/coverage/

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [quality, test]
    defaults:
      run:
        working-directory: khelsetu-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: khelsetu-frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run circular
