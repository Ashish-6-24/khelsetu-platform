version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/khelsetu-frontend'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
    groups:
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
      storybook:
        patterns:
          - 'storybook'
          - '@storybook/*'
      eslint:
        patterns:
          - 'eslint'
          - 'eslint-*'
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - 'ci'
