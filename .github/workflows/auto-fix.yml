name: Auto-Fix CI Issues

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to fix'
        required: true
      diagnosis_run_id:
        description: 'Run ID of the diagnosis that produced the JSON artifact'
        required: true
  workflow_run:
    workflows: ['Diagnose CI Failures']
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-fix:
    name: Auto-Fix Safe Issues
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.event != 'schedule')
    steps:
      # ── 1. Checkout + resolve context ───────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve context
        id: ctx
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "pr=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
            echo "run_id=${{ inputs.diagnosis_run_id }}" >> "$GITHUB_OUTPUT"
            echo "branch=" >> "$GITHUB_OUTPUT"
            echo "is_fork=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RUN_ID="${{ github.event.workflow_run.id }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          EVENT="${{ github.event.workflow_run.event }}"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          if [ "$EVENT" != "pull_request" ]; then
            echo "pr=" >> "$GITHUB_OUTPUT"
            echo "is_fork=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract PR number from diagnosis artifact name
          ARTIFACT_NAME=$(gh api "repos/$REPO/actions/runs/$RUN_ID/artifacts" \
            --jq '.artifacts[] | select(.name | startswith("diagnosis-")) | .name' 2>/dev/null || echo "")
          PR_NUM=$(echo "$ARTIFACT_NAME" | grep -oP 'diagnosis-\K[0-9]+' || echo "")
          echo "pr=$PR_NUM" >> "$GITHUB_OUTPUT"

          if [ -z "$PR_NUM" ]; then
            echo "is_fork=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Detect fork
          HEAD_REPO=$(gh pr view "$PR_NUM" --repo "$REPO" --json headRepository --jq '.headRepository.fullName // empty' 2>/dev/null || echo "")
          if [ -n "$HEAD_REPO" ] && [ "$HEAD_REPO" != "$REPO" ]; then
            echo "is_fork=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_fork=false" >> "$GITHUB_OUTPUT"
            # Override branch from PR
            PR_BRANCH=$(gh pr view "$PR_NUM" --repo "$REPO" --json headRefName --jq '.headRefName' 2>/dev/null || echo "")
            [ -n "$PR_BRANCH" ] && echo "branch=$PR_BRANCH" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}

      - name: Checkout PR branch
        run: |
          BRANCH="${{ steps.ctx.outputs.branch }}"
          [ -z "$BRANCH" ] && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"

      # ── 2. Download diagnosis ───────────────────────────────────
      - name: Download diagnosis
        id: download
        run: |
          RUN_ID="${{ steps.ctx.outputs.run_id }}"

          DIAG_ID=$(gh api "repos/$REPO/actions/runs/$RUN_ID/artifacts" \
            --jq '.artifacts[] | select(.name | startswith("diagnosis-")) | .id' 2>/dev/null || echo "")

          if [ -z "$DIAG_ID" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh api "repos/$REPO/actions/runs/$RUN_ID/artifacts/$DIAG_ID/zip" > /tmp/diagnosis.zip
          unzip -q -o /tmp/diagnosis.zip -d /tmp
          echo "found=true" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}

      # ── 3. Validate eligibility ────────────────────────────────
      - name: Validate eligibility
        id: validate
        if: steps.download.outputs.found == 'true'
        run: |
          if [ "${{ steps.ctx.outputs.is_fork }}" = "true" ]; then
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            echo "reason=Fork PR — auto-fix disabled" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$(jq -r '.retry_reached // false' /tmp/diagnosis.json)" = "true" ]; then
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            echo "reason=Retry limit reached" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$(jq -r '.auto_fixable // false' /tmp/diagnosis.json)" != "true" ]; then
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            echo "reason=Not auto-fixable: $(jq -r '.primary_issue' /tmp/diagnosis.json)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Branch policy check — require config file to exist
          BRANCH="${{ steps.ctx.outputs.branch }}"
          if [ ! -f config/workflow-policy.json ]; then
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            echo "reason=config/workflow-policy.json not found" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ALLOWED=$(jq -r --arg b "$BRANCH" '.workflows["auto-fix.yml"].allowed_branches // [] | select(index($b))' config/workflow-policy.json 2>/dev/null || echo "")
          if [ -z "$ALLOWED" ]; then
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            echo "reason=Branch '$BRANCH' not in allowed_branches" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "eligible=true" >> "$GITHUB_OUTPUT"

      # ── 4. Apply safe fixes ────────────────────────────────────
      - name: Apply safe fixes
        id: fix
        if: steps.validate.outputs.eligible == 'true'
        run: |
          npm ci --ignore-scripts 2>/dev/null

          npx prettier --write . 2>/dev/null || true
          npx eslint --fix . 2>/dev/null || true

          if ! git diff --quiet; then
            git add -A
            git commit -m "fix: auto-fix formatting and lint issues [skip ci]"
            git push origin HEAD
            echo "fixed=true" >> "$GITHUB_OUTPUT"
            echo "count=$(git diff --stat HEAD~1 --name-only | wc -l)" >> "$GITHUB_OUTPUT"
          else
            echo "fixed=false" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
          fi

      # ── 5. Post comment ────────────────────────────────────────
      - name: Post comment
        if: steps.ctx.outputs.pr != ''
        run: |
          PR="${{ steps.ctx.outputs.pr }}"
          ELIGIBLE="${{ steps.validate.outputs.eligible }}"
          FIXED="${{ steps.fix.outputs.fixed }}"
          COUNT="${{ steps.fix.outputs.count }}"

          if [ "$ELIGIBLE" = "false" ]; then
            BODY="🔒 **Auto-fix skipped**: ${{ steps.validate.outputs.reason }}"
          elif [ "$FIXED" = "true" ]; then
            BODY="✅ **Auto-fix applied**: $COUNT file(s) updated. CI will re-run."
          else
            BODY="ℹ️ **Auto-fix**: No formatting/lint changes needed."
          fi

          gh pr comment "$PR" --repo "${{ github.repository }}" --body "$BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 6. Upload diagnosis for audit trail ─────────────────────
      - name: Upload diagnosis
        if: steps.download.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: diagnosis-${{ steps.ctx.outputs.pr }}-${{ steps.ctx.outputs.run_id }}
          path: /tmp/diagnosis.json
          retention-days: 1
