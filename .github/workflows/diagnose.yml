name: Diagnose CI Failures

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: read
  actions: read

jobs:
  diagnose:
    name: Analyze CI Failure
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      (github.event.workflow_run.event == 'pull_request' || github.event.workflow_run.event == 'push')
    steps:
      # ── 1. Find PR ──────────────────────────────────────────────
      - name: Find PR
        id: find-pr
        run: |
          PR_JSON=$(gh pr list --repo "$REPO" \
            --head "$BRANCH" \
            --json number,author,state,labels,headRepository \
            --jq '.[0]')
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          PR_AUTHOR=$(echo "$PR_JSON" | jq -r '.author.login')
          HEAD_REPO=$(echo "$PR_JSON" | jq -r '.headRepository.fullName // empty')
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "author=$PR_AUTHOR" >> "$GITHUB_OUTPUT"
          echo "head_repo=$HEAD_REPO" >> "$GITHUB_OUTPUT"

          # Fork safety: skip auto-fix for fork PRs
          IS_FORK="false"
          if [ -n "$HEAD_REPO" ] && [ "$HEAD_REPO" != "$REPO" ]; then
            IS_FORK="true"
          fi
          echo "is_fork=$IS_FORK" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}

      # ── 2. Collect failure data ──────────────────────────────────
      - name: Collect failure data
        id: data
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"
          REPO="${{ github.repository }}"

          # Get failed jobs with step details
          FAILED_JOBS=$(gh api "repos/$REPO/actions/runs/$RUN_ID/jobs" \
            --jq '[.jobs[] | select(.conclusion == "failure") | {
              name: .name,
              id: .id,
              steps: [.steps[] | select(.conclusion == "failure") | .name]
            }]')
          echo "jobs<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FAILED_JOBS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # Get failed log lines (last 200 lines for deeper analysis)
          FAILED_LOGS=$(gh run view "$RUN_ID" --repo "$REPO" --log-failed 2>&1 | tail -200)
          echo "logs<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FAILED_LOGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # Get head SHA for annotations and summaries
          HEAD_SHA=$(gh api "repos/$REPO/actions/runs/$RUN_ID" --jq '.head_sha')
          echo "sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 3. Fetch job summaries ───────────────────────────────────
      - name: Fetch job summaries
        id: summaries
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"
          REPO="${{ github.repository }}"

          JOB_IDS=$(gh api "repos/$REPO/actions/runs/$RUN_ID/jobs" \
            --jq '.jobs[] | select(.conclusion == "failure") | .id')

          SUMMARIES=""
          for JOB_ID in $JOB_IDS; do
            JOB_NAME=$(gh api "repos/$REPO/actions/runs/$RUN_ID/jobs" \
              --jq ".jobs[] | select(.id == $JOB_ID) | .name")
            JOB_LOG=$(gh run view --job="$JOB_ID" --repo "$REPO" 2>&1 | tail -20)
            SUMMARIES+="=== $JOB_NAME ==="$'\n'
            SUMMARIES+="$JOB_LOG"$'\n\n'
          done

          echo "summaries<<EOF" >> "$GITHUB_OUTPUT"
          echo "${SUMMARIES:0:4000}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 4. Fetch annotations ─────────────────────────────────────
      - name: Fetch annotations
        id: annotations
        run: |
          REPO="${{ github.repository }}"
          HEAD_SHA="${{ steps.data.outputs.sha }}"

          ANNS=$(gh api "repos/$REPO/commits/$HEAD_SHA/check-runs" \
            --jq '[.check_runs[]
              | select(.conclusion == "failure")
              | .annotations_url] | .[:5] | .[]' 2>/dev/null)

          ALL_ANN="[]"
          for URL in $ANNS; do
            if [ -n "$URL" ]; then
              BATCH=$(gh api "$URL" --jq '.' 2>/dev/null || echo "[]")
              ALL_ANN=$(echo "$ALL_ANN" "$BATCH" | jq -s 'add')
            fi
          done

          FILTERED=$(echo "$ALL_ANN" | jq '[.[] | select(.annotation_level == "failure" or .annotation_level == "warning")] | .[:20]')
          echo "annotations<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILTERED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          COUNT=$(echo "$FILTERED" | jq 'length')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

          ANN_LINES=$(echo "$FILTERED" | jq -r '.[:5][] | "- `\(.path):\(.start_line)`: \(.message)"' 2>/dev/null || echo "")
          echo "lines<<EOF" >> "$GITHUB_OUTPUT"
          echo "$ANN_LINES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 5. Fetch SonarCloud findings ─────────────────────────────
      - name: Fetch SonarCloud findings
        id: sonar
        run: |
          REPO="${{ github.repository }}"
          HEAD_SHA="${{ steps.data.outputs.sha }}"
          PROJECT_KEY=$(echo "$REPO" | tr '/' '_' | tr '[:upper:]' '[:lower:]')

          # Try SonarCloud API for recent issues
          SONAR_ISSUES="[]"
          if [ -n "${{ secrets.SONARQUBECLOUD }}" ]; then
            SONAR_ISSUES=$(curl -s \
              -u "${{ secrets.SONARQUBECLOUD }}:" \
              "https://sonarcloud.io/api/issues/search?componentKeys=$PROJECT_KEY&statuses=OPEN&ps=10" \
              --connect-timeout 5 --max-time 10 2>/dev/null | \
              jq '[.issues[] | {key: .key, message: .message, component: .component, line: .line, severity: .severity}]' 2>/dev/null || echo "[]")
          fi

          echo "issues<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SONAR_ISSUES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          COUNT=$(echo "$SONAR_ISSUES" | jq 'length')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 6. Collect coverage output ───────────────────────────────
      - name: Collect coverage data
        id: coverage
        run: |
          REPO="${{ github.repository }}"
          RUN_ID="${{ github.event.workflow_run.id }}"

          # Download coverage artifact if available
          COVERAGE_PCT="N/A"
          if gh api "repos/$REPO/actions/runs/$RUN_ID/artifacts" --jq '.artifacts[] | select(.name == "coverage") | .id' 2>/dev/null | read -r ARTIFACT_ID; then
            gh api "repos/$REPO/actions/runs/$RUN_ID/artifacts/$ARTIFACT_ID/zip" > /tmp/coverage.zip 2>/dev/null
            if [ -f /tmp/coverage.zip ]; then
              unzip -q -o /tmp/coverage.zip -d /tmp/coverage 2>/dev/null || true
              # Try to extract coverage percentage from common formats
              if [ -f /tmp/coverage/coverage-summary.json ]; then
                COVERAGE_PCT=$(jq '.total.lines.pct' /tmp/coverage/coverage-summary.json 2>/dev/null || echo "N/A")
              elif [ -f /tmp/coverage/lcov.info ]; then
                COVERAGE_PCT=$(grep -m1 "LF:" /tmp/coverage/lcov.info 2>/dev/null | cut -d: -f2 || echo "N/A")
              fi
            fi
          fi

          echo "percentage=$COVERAGE_PCT" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 7. Check for flaky tests ─────────────────────────────────
      - name: Detect flaky tests
        id: flaky
        run: |
          LOGS="${{ steps.data.outputs.logs }}"
          FLAKY_PATTERNS="ECONNREFUSED|ETIMEDOUT|race condition|flaky|retry|intermittent|timing|socket hang up|heap out of memory"
          FLAKY_HITS=$(echo "$LOGS" | grep -ciE "$FLAKY_PATTERNS" | cat)
          SHARD_FAILS=$(echo "$LOGS" | grep -cE "shard.*fail|Unit.*1/2.*fail|Unit.*2/2.*fail" | cat)

          IS_FLAKY="false"
          if [ "$FLAKY_HITS" -gt 0 ] && [ "$SHARD_FAILS" -lt 2 ]; then
            IS_FLAKY="true"
          fi

          echo "is_flaky=$IS_FLAKY" >> "$GITHUB_OUTPUT"
          echo "flaky_hits=$FLAKY_HITS" >> "$GITHUB_OUTPUT"

      # ── 8. Classify issues ───────────────────────────────────────
      - name: Classify issues
        id: classify
        run: |
          LOGS="${{ steps.data.outputs.logs }}"
          LINT=$(echo "$LOGS" | grep -ciE "eslint|prettier|format" | cat)
          TYPE=$(echo "$LOGS" | grep -ciE "typescript|TS[0-9]+" | cat)
          TEST=$(echo "$LOGS" | grep -ciE "vitest|test.*fail|expect.*received" | cat)
          BUILD=$(echo "$LOGS" | grep -ciE "build|bundle|rollup|vite.*error" | cat)
          DEP=$(echo "$LOGS" | grep -ciE "npm.*ERR|dependency|module.*not.*found" | cat)
          SNAPSHOT=$(echo "$LOGS" | grep -ciE "snapshot|visual.*diff|screenshot|mismatch" | cat)

          PRIMARY="unknown"
          MAX=0
          for pair in "lint:$LINT" "type:$TYPE" "test:$TEST" "build:$BUILD" "dependency:$DEP" "snapshot:$SNAPSHOT"; do
            KEY="${pair%%:*}"
            VAL="${pair##*:}"
            if [ "$VAL" -gt "$MAX" ]; then
              PRIMARY="$KEY"
              MAX="$VAL"
            fi
          done
          if [ "$LINT" -gt 0 ] && [ "$PRIMARY" = "unknown" ]; then PRIMARY="lint"; fi

          if [ "${{ steps.flaky.outputs.is_flaky }}" = "true" ] && [ "$PRIMARY" = "test" ]; then
            PRIMARY="flaky"
          fi

          # Auto-fixable only if purely lint/format AND not a fork
          AUTO_FIXABLE="false"
          IS_FORK="${{ steps.find-pr.outputs.is_fork }}"
          if [ "$PRIMARY" = "lint" ] && [ "$TEST" -eq 0 ] && [ "$BUILD" -eq 0 ] && [ "$IS_FORK" = "false" ]; then
            AUTO_FIXABLE="true"
          fi

          echo "primary=$PRIMARY" >> "$GITHUB_OUTPUT"
          echo "auto_fixable=$AUTO_FIXABLE" >> "$GITHUB_OUTPUT"
          echo "lint=$LINT" >> "$GITHUB_OUTPUT"
          echo "type=$TYPE" >> "$GITHUB_OUTPUT"
          echo "test=$TEST" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "dep=$DEP" >> "$GITHUB_OUTPUT"
          echo "snapshot=$SNAPSHOT" >> "$GITHUB_OUTPUT"

      # ── 9. Check retry limit ─────────────────────────────────────
      - name: Check retry limit
        id: retry
        run: |
          REPO="${{ github.repository }}"
          PR="${{ steps.find-pr.outputs.number }}"

          REACHED_LIMIT="false"
          DIAGNOSE_COMMENTS=0

          if [ -n "$PR" ] && [ "$PR" != "null" ] && [ "$PR" != "" ]; then
            DIAGNOSE_COMMENTS=$(gh api "repos/$REPO/issues/$PR/comments" \
              --jq '[.[] | select(.body | contains("CI Diagnosis")) | select(.user.login == "github-actions[bot]")] | length' 2>/dev/null || echo 0)

            if [ "$DIAGNOSE_COMMENTS" -ge 3 ]; then
              REACHED_LIMIT="true"
            fi
          fi

          echo "reached_limit=$REACHED_LIMIT" >> "$GITHUB_OUTPUT"
          echo "comment_count=$DIAGNOSE_COMMENTS" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 10. Write structured JSON diagnosis ──────────────────────
      - name: Write diagnosis JSON
        run: |
          DIAGNOSIS=$(jq -n \
            --arg workflow "${{ github.event.workflow_run.name }}" \
            --arg conclusion "${{ github.event.workflow_run.conclusion }}" \
            --arg branch "${{ github.event.workflow_run.head_branch }}" \
            --arg sha "${{ steps.data.outputs.sha }}" \
            --arg primary "${{ steps.classify.outputs.primary }}" \
            --arg auto_fixable "${{ steps.classify.outputs.auto_fixable }}" \
            --argjson failed_jobs '${{ steps.data.outputs.jobs || '[]' }}' \
            --argjson annotations '${{ steps.annotations.outputs.annotations || '[]' }}' \
            --argjson sonar_issues '${{ steps.sonar.outputs.issues || '[]' }}' \
            --arg coverage "${{ steps.coverage.outputs.percentage }}" \
            --arg is_flaky "${{ steps.flaky.outputs.is_flaky }}" \
            --arg is_fork "${{ steps.find-pr.outputs.is_fork }}" \
            --arg pr_number "${{ steps.find-pr.outputs.number || '' }}" \
            --arg retry_reached "${{ steps.retry.outputs.reached_limit }}" \
            --argjson lint "${{ steps.classify.outputs.lint || 0 }}" \
            --argjson type "${{ steps.classify.outputs.type || 0 }}" \
            --argjson test "${{ steps.classify.outputs.test || 0 }}" \
            --argjson build_count "${{ steps.classify.outputs.build || 0 }}" \
            --argjson dep "${{ steps.classify.outputs.dep || 0 }}" \
            --argjson snapshot "${{ steps.classify.outputs.snapshot || 0 }}" \
            '{
              timestamp: (now | todate),
              workflow: $workflow,
              conclusion: $conclusion,
              branch: $branch,
              sha: $sha,
              pr_number: ($pr_number | tonumber),
              is_fork: ($is_fork == "true"),
              primary_issue: $primary,
              auto_fixable: ($auto_fixable == "true"),
              retry_reached: ($retry_reached == "true"),
              counts: {
                lint: $lint,
                type: $type,
                test: $test,
                build: $build_count,
                dependency: $dep,
                snapshot: $snapshot
              },
              failed_jobs: $failed_jobs,
              annotations: $annotations,
              sonar_findings: $sonar_issues,
              coverage: $coverage,
              is_flaky: ($is_flaky == "true")
            }')

          echo "$DIAGNOSIS" > /tmp/diagnosis.json
          echo "diagnosis<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DIAGNOSIS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # Upload as artifact for auto-fix and verify workflows
          cat > /tmp/diagnosis-upload.sh << 'UPLOAD_EOF'
          #!/bin/bash
          echo '${{ steps.data.outputs.jobs }}' > /tmp/jobs.json
          UPLOAD_EOF

      - name: Upload diagnosis artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: diagnosis-${{ github.event.workflow_run.id }}
          path: /tmp/diagnosis.json
          retention-days: 1

      # ── 11. Auto-fix lint issues (skip for forks) ────────────────
      - name: Checkout PR branch
        if: >-
          steps.classify.outputs.auto_fixable == 'true' &&
          steps.retry.outputs.reached_limit == 'false' &&
          steps.find-pr.outputs.is_fork == 'false'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Auto-fix lint issues
        id: auto-fix
        if: >-
          steps.classify.outputs.auto_fixable == 'true' &&
          steps.retry.outputs.reached_limit == 'false' &&
          steps.find-pr.outputs.is_fork == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          npm ci --ignore-scripts 2>/dev/null
          npx prettier --write . 2>/dev/null || npm run format 2>/dev/null || true

          if ! git diff --quiet; then
            git add -A
            git commit -m "style: auto-fix formatting [skip ci]"
            git push origin HEAD
            echo "fixed=true" >> "$GITHUB_OUTPUT"
          else
            echo "fixed=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 12. Post diagnosis comment ───────────────────────────────
      - name: Post diagnosis comment
        if: steps.find-pr.outputs.number != '' && steps.find-pr.outputs.number != 'null'
        run: |
          PR="${{ steps.find-pr.outputs.number }}"
          PRIMARY="${{ steps.classify.outputs.primary }}"
          LINT="${{ steps.classify.outputs.lint }}"
          TYPE="${{ steps.classify.outputs.type }}"
          TEST="${{ steps.classify.outputs.test }}"
          BUILD="${{ steps.classify.outputs.build }}"
          DEP="${{ steps.classify.outputs.dep }}"
          SNAP="${{ steps.classify.outputs.snapshot }}"
          ANNS="${{ steps.annotations.outputs.count }}"
          SONAR="${{ steps.sonar.outputs.count }}"
          COV="${{ steps.coverage.outputs.percentage }}"
          FIXED="${{ steps.auto-fix.outputs.fixed }}"
          IS_FLAKY="${{ steps.flaky.outputs.is_flaky }}"
          REACHED="${{ steps.retry.outputs.reached_limit }}"
          COUNT="${{ steps.retry.outputs.comment_count }}"
          IS_FORK="${{ steps.find-pr.outputs.is_fork }}"

          BADGE="⚠️"
          if [ "$PRIMARY" = "lint" ] || [ "$PRIMARY" = "snapshot" ]; then BADGE="🔧"; fi
          if [ "$IS_FLAKY" = "true" ]; then BADGE="🔄"; fi
          if [ "$PRIMARY" = "type" ] || [ "$PRIMARY" = "build" ] || [ "$PRIMARY" = "test" ]; then BADGE="⛔"; fi

          BODY="## $BADGE CI Diagnosis — \`$PRIMARY\` issues

          | Category | Hits |
          |----------|------|
          | Lint/Format | $LINT |
          | Type Errors | $TYPE |
          | Test Failures | $TEST |
          | Build Errors | $BUILD |
          | Dependencies | $DEP |
          | Snapshot/Visual | $SNAP |
          | Annotations | $ANNS |
          | Sonar Findings | $SONAR |
          | Coverage | ${COV}% |

          "

          if [ "$IS_FLAKY" = "true" ]; then
            BODY="$BODY

          🔄 **Flaky test detected** — re-run the failed job. If it persists, the test needs investigation."
          elif [ "$FIXED" = "true" ]; then
            BODY="$BODY

          ✅ **Auto-fixed**: Formatting issues pushed. CI will re-run."
          elif [ "$IS_FORK" = "true" ]; then
            BODY="$BODY

          🔒 **Fork PR** — auto-fix disabled for security. Please fix locally and push."
          elif [ "${{ steps.classify.outputs.auto_fixable }}" = "true" ] && [ "$REACHED" = "false" ]; then
            BODY="$BODY

          🔧 **Auto-fixable locally**: Run \`npm run format\` and push."
          elif [ "$REACHED" = "true" ]; then
            BODY="$BODY

          ⏳ **Auto-fix limit reached** ($COUNT attempts). Manual fix required."
          elif [ "$PRIMARY" = "snapshot" ]; then
            BODY="$BODY

          📸 **Snapshot/visual diff** — update snapshots with \`npm test -- --update\` or review visual changes."
          elif [ "$PRIMARY" = "type" ] || [ "$PRIMARY" = "build" ] || [ "$PRIMARY" = "test" ]; then
            BODY="$BODY

          ⛔ **Manual fix required** — type, test, or build errors need human attention."
          else
            BODY="$BODY

          ⚠️ **Review needed** — check the failing CI jobs for details."
          fi

          ANN_LINES="${{ steps.annotations.outputs.lines }}"
          if [ -n "$ANN_LINES" ]; then
            BODY="$BODY

          **Top annotations:**
          $ANN_LINES"
          fi

          SUMMARIES="${{ steps.summaries.outputs.summaries }}"
          if [ -n "$SUMMARIES" ]; then
            BODY="$BODY

          **Failed jobs:**
          \`\`\`
          $(echo "$SUMMARIES" | tail -30)
          \`\`\`"
          fi

          BODY="$BODY

          ---
          *Diagnosed by [workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }})*"

          gh pr comment "$PR" --repo "${{ github.repository }}" --body "$BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
