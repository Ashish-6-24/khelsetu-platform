name: Diagnose CI Failures

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  checks: read

jobs:
  diagnose:
    name: Analyze CI Failure
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Find PR
        id: find-pr
        run: |
          PR_JSON=$(gh pr list --repo "$REPO" \
            --head "$BRANCH" \
            --json number,author,state \
            --jq '.[0]')
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          PR_AUTHOR=$(echo "$PR_JSON" | jq -r '.author.login')
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "author=$PR_AUTHOR" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}

      - name: Collect failure data
        id: data
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"
          REPO="${{ github.repository }}"

          # Get failed jobs with step details
          FAILED_JOBS=$(gh api "repos/$REPO/actions/runs/$RUN_ID/jobs" \
            --jq '[.jobs[] | select(.conclusion == "failure") | {
              name: .name,
              steps: [.steps[] | select(.conclusion == "failure") | .name]
            }]')

          echo "jobs<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FAILED_JOBS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # Get failed log lines (last 100 lines of each failed job)
          FAILED_LOGS=$(gh run view "$RUN_ID" --repo "$REPO" --log-failed 2>&1 | tail -100)
          echo "logs<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FAILED_LOGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # Get head SHA for annotations
          HEAD_SHA=$(gh api "repos/$REPO/actions/runs/$RUN_ID" --jq '.head_sha')
          echo "sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch annotations
        id: annotations
        run: |
          REPO="${{ github.repository }}"
          HEAD_SHA="${{ steps.data.outputs.sha }}"

          ANNS=$(gh api "repos/$REPO/commits/$HEAD_SHA/check-runs" \
            --jq '[.check_runs[]
              | select(.conclusion == "failure")
              | .annotations_url] | .[:5] | .[]' 2>/dev/null)

          ALL_ANN="[]"
          for URL in $ANNS; do
            if [ -n "$URL" ]; then
              BATCH=$(gh api "$URL" --jq '.' 2>/dev/null || echo "[]")
              ALL_ANN=$(echo "$ALL_ANN" "$BATCH" | jq -s 'add')
            fi
          done

          FILTERED=$(echo "$ALL_ANN" | jq '[.[] | select(.annotation_level == "failure" or .annotation_level == "warning")] | .[:20]')
          echo "annotations<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILTERED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          COUNT=$(echo "$FILTERED" | jq 'length')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Classify issues
        id: classify
        run: |
          LOGS="${{ steps.data.outputs.logs }}"

          # Count occurrences — pipe through cat so grep always exits 0
          LINT=$(echo "$LOGS" | grep -ciE "eslint|prettier|format" | cat)
          TYPE=$(echo "$LOGS" | grep -ciE "typescript|TS[0-9]+" | cat)
          TEST=$(echo "$LOGS" | grep -ciE "vitest|test.*fail|expect.*received" | cat)
          BUILD=$(echo "$LOGS" | grep -ciE "build|bundle|rollup|vite.*error" | cat)
          DEP=$(echo "$LOGS" | grep -ciE "npm.*ERR|dependency|module.*not.*found" | cat)

          # Determine primary issue type
          PRIMARY="unknown"
          MAX=0
          for pair in "lint:$LINT" "type:$TYPE" "test:$TEST" "build:$BUILD" "dependency:$DEP"; do
            KEY="${pair%%:*}"
            VAL="${pair##*:}"
            if [ "$VAL" -gt "$MAX" ]; then
              PRIMARY="$KEY"
              MAX="$VAL"
            fi
          done
          if [ "$LINT" -gt 0 ] && [ "$PRIMARY" = "unknown" ]; then PRIMARY="lint"; fi

          # Auto-fixable only if purely lint/format
          AUTO_FIXABLE="false"
          if [ "$PRIMARY" = "lint" ] && [ "$TYPE" -eq 0 ] && [ "$TEST" -eq 0 ] && [ "$BUILD" -eq 0 ]; then
            AUTO_FIXABLE="true"
          fi

          echo "primary=$PRIMARY" >> "$GITHUB_OUTPUT"
          echo "auto_fixable=$AUTO_FIXABLE" >> "$GITHUB_OUTPUT"
          echo "lint=$LINT" >> "$GITHUB_OUTPUT"
          echo "type=$TYPE" >> "$GITHUB_OUTPUT"
          echo "test=$TEST" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "dep=$DEP" >> "$GITHUB_OUTPUT"

      - name: Auto-fix lint issues
        id: auto-fix
        if: steps.classify.outputs.auto_fixable == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH" 2>/dev/null || git checkout "$BRANCH"

          # Install deps and run formatter
          npm ci --ignore-scripts 2>/dev/null
          npx prettier --write . 2>/dev/null || npm run format 2>/dev/null || true

          if ! git diff --quiet; then
            git add -A
            git commit -m "style: auto-fix formatting [skip ci]"
            git push origin "$BRANCH"
            echo "fixed=true" >> "$GITHUB_OUTPUT"
          else
            echo "fixed=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}

      - name: Post diagnosis comment
        if: steps.find-pr.outputs.number != '' && steps.find-pr.outputs.number != 'null'
        run: |
          PR="${{ steps.find-pr.outputs.number }}"
          PRIMARY="${{ steps.classify.outputs.primary }}"
          LINT="${{ steps.classify.outputs.lint }}"
          TYPE="${{ steps.classify.outputs.type }}"
          TEST="${{ steps.classify.outputs.test }}"
          BUILD="${{ steps.classify.outputs.build }}"
          DEP="${{ steps.classify.outputs.dep }}"
          ANNS="${{ steps.annotations.outputs.count }}"
          FIXED="${{ steps.auto-fix.outputs.fixed }}"

          BODY="## 🤖 CI Diagnosis — \`$PRIMARY\` issues

          | Category | Hits |
          |----------|------|
          | Lint/Format | $LINT |
          | Type Errors | $TYPE |
          | Test Failures | $TEST |
          | Build Errors | $BUILD |
          | Dependencies | $DEP |
          | Annotations | $ANNS |
          "

          if [ "$FIXED" = "true" ]; then
            BODY="$BODY

          ✅ **Auto-fixed**: Formatting issues pushed. CI will re-run."
          elif [ "${{ steps.classify.outputs.auto_fixable }}" = "true" ]; then
            BODY="$BODY

          🔧 **Auto-fixable locally**: Run \`npm run format\` and push."
          elif [ "$PRIMARY" = "type" ] || [ "$PRIMARY" = "build" ] || [ "$PRIMARY" = "test" ]; then
            BODY="$BODY

          ⛔ **Manual fix required** — type, test, or build errors need human attention."
          else
            BODY="$BODY

          ⚠️ **Review needed** — check the failing CI jobs for details."
          fi

          # Add top annotations
          if [ "$ANNS" -gt 0 ]; then
            BODY="$BODY

          **Top annotations:**
          ${{ steps.annotations.outputs.annotations }}" | jq -r '.[:5][] | "- `\(.path):\(.start_line)`: \(.message)"' 2>/dev/null >> /dev/null || true
          fi

          BODY="$BODY

          ---
          *Diagnosed by [workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }})*"

          gh pr comment "$PR" --repo "${{ github.repository }}" --body "$BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
