name: Accessibility

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

concurrency:
  group: a11y-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'

defaults:
  run:
    working-directory: khelsetu-frontend

jobs:
  a11y:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: khelsetu-frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run build
      - name: Run a11y tests (public pages)
        run: npx playwright test --project=a11y-public
      - name: Upload report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: a11y-report
          path: khelsetu-frontend/playwright-report/
          retention-days: 14
          if-no-files-found: ignore
      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: a11y-results
          path: khelsetu-frontend/test-results/
          retention-days: 14
          if-no-files-found: ignore
