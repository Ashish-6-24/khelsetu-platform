name: E2E

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'

defaults:
  run:
    working-directory: khelsetu-frontend

jobs:
  e2e:
    name: E2E (Shard ${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: khelsetu-frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run build
      - name: Run E2E tests (shard ${{ matrix.shard }}/2)
        run: npx playwright test --project=chromium --shard=${{ matrix.shard }}/2
      - name: Upload Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: e2e-report-shard-${{ matrix.shard }}
          path: khelsetu-frontend/playwright-report/
          retention-days: 14
          if-no-files-found: ignore
      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: e2e-results-shard-${{ matrix.shard }}
          path: khelsetu-frontend/test-results/
          retention-days: 14
          if-no-files-found: ignore

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: khelsetu-frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run build
      - name: Run smoke tests
        run: npx playwright test --project=smoke
      - name: Upload smoke report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: smoke-report
          path: khelsetu-frontend/playwright-report/
          retention-days: 14
          if-no-files-found: ignore
