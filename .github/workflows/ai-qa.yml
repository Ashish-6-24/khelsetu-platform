name: AI QA

on:
  schedule:
    # Twice a week: Sunday and Wednesday at midnight Kathmandu (UTC+5:45) = 18:15 UTC
    - cron: '15 18 * * 0,3'
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Specific scenario to test (leave empty for all)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  ai-qa:
    name: AI Exploratory QA
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install and start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          curl -s http://localhost:11434/api/tags > /dev/null && echo "Ollama is running" || echo "Ollama failed to start"

      - name: Pull Qwen3 model
        run: |
          ollama pull qwen3
          ollama list | grep qwen3 && echo "Qwen3 ready" || echo "Qwen3 pull failed"

      - name: Install dependencies
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Build application
        run: npm run build

      - name: Start application server
        run: |
          npm run preview &
          sleep 5
          curl -s http://localhost:3000 > /dev/null && echo "Server is running" || echo "Server failed to start"

      - name: Run AI QA with Stagehand
        run: |
          mkdir -p reports/ai-qa
          npx stagehand test --config ai-qa.config.ts 2>&1 | tee reports/ai-qa/output.log

      - name: Generate summary report
        if: always()
        run: |
          mkdir -p reports/ai-qa
          cat > reports/ai-qa/REPORT.md << 'REPORT_EOF'
          # AI QA Report

          **Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **Commit:** ${{ github.sha }}
          **Branch:** ${{ github.ref_name }}

          ## Test Scenarios

          The following scenarios were tested by the AI agent:

          1. **Homepage Exploration** - Visit as first-time user, check navigation, CTAs, content
          2. **Authentication Flow** - Test login, register, form validation, error states
          3. **Dashboard Navigation** - Check stats cards, recent matches, quick actions
          4. **Settings Management** - Theme toggle, profile updates, password changes
          5. **Tournament Browsing** - Search, filter, view tournament details

          ## Output

          See `output.log` for detailed AI agent output.

          ## Notes

          - AI QA is exploratory, not deterministic
          - Reports are informational, not blocking
          - Run manually for specific PRs: `gh workflow run ai-qa.yml`
          REPORT_EOF
          echo "Report generated"

      - name: Upload AI QA report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ai-qa-report-${{ github.run_id }}
          path: reports/ai-qa/
          retention-days: 30
          if-no-files-found: ignore
