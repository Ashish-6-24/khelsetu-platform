name: Auto-Merge Dependencies

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Approve & queue auto-merge
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Approve PR
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.DEPS_BOT_TOKEN }}

      - name: Queue auto-merge (waits for required checks)
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.DEPS_BOT_TOKEN }}

# This does NOT bypass CI. --auto queues the merge; GitHub itself holds it
# until the required status checks configured in branch protection succeed.
# See BRANCH_PROTECTION.md — this workflow is only safe if that rule exists.
