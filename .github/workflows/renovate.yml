name: Renovate

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday 6 AM UTC (11:45 AM NPT)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v46
        with:
          configurationFile: renovate.json
          token: ${{ secrets.RENOVATE_TOKEN }}
