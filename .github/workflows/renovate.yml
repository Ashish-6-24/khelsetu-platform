name: Renovate

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday 6 AM UTC (11:45 AM NPT)
  workflow_dispatch:

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@eb932558ad942cccfd8211cf535f17ff183a9f74
        with:
          configurationFile: renovate.json
          token: ${{ secrets.RENOVATE_TOKEN }}
