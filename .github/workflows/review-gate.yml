name: Review Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate merge eligibility
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request?.number
              || context.payload.pull_request_review?.pull_request.number;

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const author = pr.user.login;
            console.log(`PR #${prNumber} author: ${author}`);

            // Bot PRs are handled by auto-merge-deps.yml
            if (author === 'dependabot[bot]' || author === 'renovate[bot]') {
              console.log('Bot PR — gate passed (auto-merge handles this)');
              return;
            }

            if (author === 'Ashish-6-24') {
              console.log('Owner PR — gate passed');
              return;
            }

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const ownerApproved = reviews.some(
              r => r.user.login === 'Ashish-6-24' && r.state === 'APPROVED'
            );

            if (ownerApproved) {
              console.log('Owner approved — gate passed');
              return;
            }

            console.log('Waiting for owner review — gate failed');
            core.setFailed('Collaborator PR requires owner review before merge');
