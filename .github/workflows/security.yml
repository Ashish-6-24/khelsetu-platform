name: Security

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: ./.github/actions/setup-node
      - run: npm audit --omit=dev --audit-level=high

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: ./.github/actions/setup-node
      - name: Initialize CodeQL
        uses: github/codeql-action/init@703b9949c65fcfced30e2f9f41569c4adfcb657f
        with:
          languages: javascript-typescript
          queries: +security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@703b9949c65fcfced30e2f9f41569c4adfcb657f
      - name: Analyze
        uses: github/codeql-action/analyze@703b9949c65fcfced30e2f9f41569c4adfcb657f
        with:
          category: '/language:javascript-typescript'

  dep-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          fail-on-severity: high
