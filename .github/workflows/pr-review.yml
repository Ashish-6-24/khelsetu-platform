name: PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write

jobs:
  pr-agent:
    name: AI Code Review
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      github.event.pull_request.user.login != 'renovate[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Select model with fallback
        id: model
        run: |
          REGISTRY="config/model-registry.json"
          if [ ! -f "$REGISTRY" ]; then
            echo "model=glm-5.2" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PRIMARY=$(jq -r '.selection_policy.primary' "$REGISTRY")
          FALLBACKS=$(jq -r '.fallback_chain[]' "$REGISTRY")
          MAX_RETRIES=$(jq -r '.selection_policy.max_retries_per_model' "$REGISTRY")

          # Try primary first, then fallbacks
          for MODEL in $PRIMARY $FALLBACKS; do
            # Test model availability with a lightweight request
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${{ secrets.NVIDIA_NIM_API_KEY }}" \
              -H "Content-Type: application/json" \
              "${{ secrets.NVIDIA_NIM_BASE_URL || 'https://integrate.api.nvidia.com/v1' }}/chat/completions" \
              -d "{\"model\":\"$MODEL\",\"messages\":[{\"role\":\"user\",\"content\":\"test\"}],\"max_tokens\":1}" \
              --connect-timeout 5 --max-time 10 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "429" ]; then
              echo "model=$MODEL" >> "$GITHUB_OUTPUT"
              echo "Using model: $MODEL (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Model $MODEL unavailable (HTTP $HTTP_CODE), trying next..."
          done

          # All models failed, use primary anyway (let PR-Agent handle errors)
          echo "model=$PRIMARY" >> "$GITHUB_OUTPUT"
          echo "All models unavailable, falling back to primary: $PRIMARY"

      - name: PR-Agent Review
        uses: The-PR-Agent/pr-agent@8e4d32e5497defd43c023a404f73560c62728961
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_BASE_URL: https://integrate.api.nvidia.com/v1
          OPENAI_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          OPENAI_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          CONFIG.MODEL: ${{ steps.model.outputs.model }}
          CONFIG.ANALYZE_TEMPLATES: 'true'
          GITHUB_ACTION_CONFIG.AUTO_IMPROVE: 'false'
          GITHUB_ACTION_CONFIG.PR_REVIEWER_RUN_ON_Synchronize: 'true'
          GITHUB_ACTION_CONFIG.PR_REVIEWER_ENABLE_REVIEW: 'true'
          GITHUB_ACTION_CONFIG.PUSH_REMOTE_ORIGIN: 'false'
