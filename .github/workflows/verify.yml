name: Verify Fix

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to verify'
        required: true
      fix_run_id:
        description: 'Run ID of the auto-fix that produced the patch'
        required: true
  workflow_run:
    workflows: ['Auto-Fix CI Issues']
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  checks: read

jobs:
  verify:
    name: Verify Fix Result
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event != 'schedule')
    steps:
      # ── 1. Determine context ─────────────────────────────────────
      - name: Determine context
        id: context
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "pr_number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
            echo "run_id=${{ inputs.fix_run_id }}" >> "$GITHUB_OUTPUT"
          else
            RUN_ID="${{ github.event.workflow_run.id }}"
            EVENT="${{ github.event.workflow_run.event }}"
            echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

            if [ "$EVENT" = "pull_request" ]; then
              ARTIFACT_NAME=$(gh api "repos/$REPO/actions/runs/$RUN_ID/artifacts" \
                --jq '.artifacts[] | select(.name | startswith("fix-results-")) | .name' 2>/dev/null || echo "")
              PR_NUM=$(echo "$ARTIFACT_NAME" | grep -oP 'fix-results-\K[0-9]+' || echo "")
              echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
            else
              echo "pr_number=" >> "$GITHUB_OUTPUT"
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}

      # ── 2. Wait for CI to complete ───────────────────────────────
      - name: Wait for CI
        run: |
          PR="${{ steps.context.outputs.pr_number }}"
          echo "Waiting for CI to complete on PR #$PR..."

          # Poll CI status every 30 seconds, max 10 minutes
          for i in $(seq 1 20); do
            STATUS=$(gh pr checks "$PR" --repo "$REPO" 2>/dev/null | grep -c "pending" || echo "0")
            if [ "$STATUS" -eq 0 ]; then
              echo "CI completed"
              break
            fi
            echo "Waiting... ($i/20) — $STATUS checks pending"
            sleep 30
          done

          # Final status check
          CI_STATE=$(gh pr checks "$PR" --repo "$REPO" 2>/dev/null | grep -c "fail" || echo "0")
          echo "failed_count=$CI_STATE" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}

      # ── 3. Check specific previously-failed jobs ─────────────────
      - name: Verify previously-failed jobs
        id: verify
        run: |
          RUN_ID="${{ steps.context.outputs.run_id }}"
          REPO="${{ github.repository }}"

          # Download original diagnosis
          if gh api "repos/$REPO/actions/runs/$RUN_ID/artifacts" \
            --jq '.artifacts[] | select(.name | startswith("diagnosis-")) | .id' 2>/dev/null | \
            read -r DIAG_ARTIFACT_ID; then
            gh api "repos/$REPO/actions/runs/$RUN_ID/artifacts/$DIAG_ARTIFACT_ID/zip" > /tmp/original-diagnosis.zip 2>/dev/null
            unzip -q -o /tmp/original-diagnosis.zip -d /tmp/original-diagnosis 2>/dev/null || true
          fi

          # Extract previously failed job names
          PREV_FAILED=$(jq -r '.failed_jobs[].name // empty' /tmp/original-diagnosis/diagnosis.json 2>/dev/null || echo "")

          # Check current CI status
          PR="${{ steps.context.outputs.pr_number }}"
          CURRENT_FAILS=$(gh pr checks "$PR" --repo "$REPO" 2>/dev/null | grep -c "fail" || echo "0")

          # Determine result
          ORIGINAL_PRIMARY=$(jq -r '.primary_issue // "unknown"' /tmp/original-diagnosis/diagnosis.json 2>/dev/null || echo "unknown")

          if [ "$CURRENT_FAILS" -gt 0 ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "message=CI still has $CURRENT_FAILS failing check(s)" >> "$GITHUB_OUTPUT"
          elif [ "$ORIGINAL_PRIMARY" = "unknown" ]; then
            echo "status=uncertain" >> "$GITHUB_OUTPUT"
            echo "message=Original issue was 'unknown' — manual verification recommended" >> "$GITHUB_OUTPUT"
          else
            echo "status=passed" >> "$GITHUB_OUTPUT"
            echo "message=All checks passing. Original issue ($ORIGINAL_PRIMARY) resolved." >> "$GITHUB_OUTPUT"
          fi

          echo "original_primary=$ORIGINAL_PRIMARY" >> "$GITHUB_OUTPUT"

      # ── 4. Post verification comment ─────────────────────────────
      - name: Post verification comment
        if: steps.context.outputs.pr_number != ''
        run: |
          PR="${{ steps.context.outputs.pr_number }}"
          STATUS="${{ steps.verify.outputs.status }}"
          MESSAGE="${{ steps.verify.outputs.message }}"
          PRIMARY="${{ steps.verify.outputs.original_primary }}"

          if [ "$STATUS" = "passed" ]; then
            BADGE="✅"
            BODY="## $BADGE Fix Verified

          $MESSAGE

          The \`$PRIMARY\` issue that triggered diagnosis has been resolved."
          elif [ "$STATUS" = "failed" ]; then
            BADGE="❌"
            BODY="## $BADGE Fix Incomplete

          $MESSAGE

          The fix did not resolve the issue. Manual intervention required."
          else
            BADGE="⚠️"
            BODY="## $BADge Fix Uncertain

          $MESSAGE

          Please review the CI results manually."
          fi

          BODY="$BODY

          ---
          *Verified by [workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*"

          gh pr comment "$PR" --repo "${{ github.repository }}" --body "$BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 5. Update model telemetry ────────────────────────────────
      - name: Update model telemetry
        if: steps.verify.outputs.status == 'passed'
        run: |
          # Record successful model usage for ranking
          MODEL="glm-5.2"  # Current active model
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          PR="${{ steps.context.outputs.pr_number }}"

          # Append to telemetry log (would be in a real telemetry store)
          echo "{\"model\":\"$MODEL\",\"timestamp\":\"$TIMESTAMP\",\"pr\":$PR,\"result\":\"success\",\"issue_type\":\"${{ steps.verify.outputs.original_primary }}\"}" >> /tmp/model-telemetry.jsonl

          # Upload telemetry for future ranking
          cat /tmp/model-telemetry.jsonl
