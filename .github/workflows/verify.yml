name: Verify Fix

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to verify'
        required: true
  workflow_run:
    workflows: ['Auto-Fix CI Issues']
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  checks: read

jobs:
  verify:
    name: Verify Fix Result
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event != 'schedule')
    steps:
      # ── 1. Determine context ─────────────────────────────────────
      - name: Determine context
        id: context
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "pr_number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            RUN_ID="${{ github.event.workflow_run.id }}"
            EVENT="${{ github.event.workflow_run.event }}"

            if [ "$EVENT" = "pull_request" ]; then
              ARTIFACT_NAME=$(gh api "repos/$REPO/actions/runs/$RUN_ID/artifacts" \
                --jq '.artifacts[] | select(.name | startswith("fix-results-")) | .name' 2>/dev/null || echo "")
              PR_NUM=$(echo "$ARTIFACT_NAME" | grep -oP 'fix-results-\K[0-9]+' | head -1 || echo "")
              echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
            else
              echo "pr_number=" >> "$GITHUB_OUTPUT"
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}

      # ── 2. Check final CI status ─────────────────────────────────
      - name: Check CI status
        id: verify
        run: |
          PR="${{ steps.context.outputs.pr_number }}"

          if [ -z "$PR" ] || [ "$PR" = "null" ] || [ "$PR" = "" ]; then
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            echo "message=No PR number found" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if any checks are still pending
          PENDING=$(gh pr checks "$PR" --repo "$REPO" 2>/dev/null | grep -c "pending" || echo "0")
          if [ "$PENDING" -gt 0 ]; then
            echo "status=pending" >> "$GITHUB_OUTPUT"
            echo "message=$PENDING check(s) still pending" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check for failures
          FAILED=$(gh pr checks "$PR" --repo "$REPO" 2>/dev/null | grep -c "fail" || echo "0")
          if [ "$FAILED" -gt 0 ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "message=CI still has $FAILED failing check(s)" >> "$GITHUB_OUTPUT"
          else
            echo "status=passed" >> "$GITHUB_OUTPUT"
            echo "message=All checks passing." >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}

      # ── 3. Post verification comment ─────────────────────────────
      - name: Post verification comment
        if: steps.context.outputs.pr_number != '' && steps.context.outputs.pr_number != 'null'
        run: |
          PR="${{ steps.context.outputs.pr_number }}"
          STATUS="${{ steps.verify.outputs.status }}"
          MESSAGE="${{ steps.verify.outputs.message }}"

          if [ "$STATUS" = "passed" ]; then
            BADGE="✅"
          elif [ "$STATUS" = "failed" ]; then
            BADGE="❌"
          else
            BADGE="⚠️"
          fi

          BODY="## $BADGE Fix Verification

          $MESSAGE

          ---
          *Verified by [workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*"

          gh pr comment "$PR" --repo "${{ github.repository }}" --body "$BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
