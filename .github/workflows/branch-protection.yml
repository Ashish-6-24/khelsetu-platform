name: Enforce Branch Protection

on:
  push:
    branches: [master]
    paths: ['.github/workflows/branch-protection.yml']
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 06:00 UTC — drift correction
  workflow_dispatch:

permissions:
  contents: write
  administration: write

jobs:
  enforce:
    name: Enforce master protection
    runs-on: ubuntu-latest
    steps:
      - name: Set branch protection rules
        run: |
          gh api \
            --method PUT \
            "repos/$REPO/branches/master/protection" \
            --input - << 'EOF'
          {
            "required_status_checks": {
              "strict": true,
              "contexts": [
                "Pipeline Gate",
                "CodeQL"
              ]
            },
            "required_pull_request_reviews": {
              "dismiss_stale_reviews": true,
              "require_code_owner_reviews": true,
              "required_approving_review_count": 1
            },
            "enforce_admins": true,
            "required_linear_history": false,
            "allow_force_pushes": false,
            "allow_deletions": false,
            "block_creations": false,
            "required_conversation_resolution": true,
            "lock_branch": false,
            "allow_fork_syncing": false,
            "restrictions": null
          }
          EOF
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}

      - name: Verify protection applied
        run: |
          gh api "repos/$REPO/branches/master/protection" | jq '{
            required_reviews: .required_pull_request_reviews.required_approving_review_count,
            dismiss_stale: .required_pull_request_reviews.dismiss_stale_reviews,
            code_owner_reviews: .required_pull_request_reviews.require_code_owner_reviews,
            status_checks: .required_status_checks.contexts,
            enforce_admins: .enforce_admins.enabled,
            allow_force_pushes: .allow_force_pushes.enabled,
            allow_deletions: .allow_deletions.enabled,
            conversation_resolution: .required_conversation_resolution.enabled
          }'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
