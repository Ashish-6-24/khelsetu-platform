name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '22'

# ─────────────────────────────────────────────────────────────────
#  Pipeline Architecture
#
#  Stage 1 ─ Lint & Format     (parallel, ~30s)
#  Stage 2 ─ Type Check        (parallel, ~30s)
#  Stage 3 ─ Build             (after stages 1-2, ~60s)
#  Stage 4 ─ Unit Tests        (after stage 3, parallel shards, ~60s)
#  Stage 5 ─ Integration Tests (after stage 4, heavy tier only)
#       ├─ E2E (chromium, 2 shards)
#       ├─ Smoke Tests
#       ├─ Accessibility Audit
#       └─ Lighthouse Performance
#  Final  ─ Pipeline Gate      (evaluates all stages)
# ─────────────────────────────────────────────────────────────────

jobs:
  # ╔══════════════════════════════════════════════════════════════╗
  # ║  STAGE 1 — Lint & Format                                   ║
  # ║  Fast feedback on code style. Runs in parallel.             ║
  # ╚══════════════════════════════════════════════════════════════╝

  lint:
    name: '1 · Lint'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: ./.github/actions/setup-node
      - run: npm run lint

  format:
    name: '1 · Format'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: ./.github/actions/setup-node
      - run: npm run format:check

  # ╔══════════════════════════════════════════════════════════════╗
  # ║  STAGE 2 — Type Check & Architecture                       ║
  # ║  Static analysis, runs in parallel.                         ║
  # ╚══════════════════════════════════════════════════════════════╝

  typecheck:
    name: '2 · Type Check'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: ./.github/actions/setup-node
      - run: npm run typecheck

  circular:
    name: '2 · Circular Deps'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: ./.github/actions/setup-node
      - run: npm run circular

  structure:
    name: '2 · Structure'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: bash scripts/check-duplicates.sh

  # ╔══════════════════════════════════════════════════════════════╗
  # ║  STAGE 3 — Build                                            ║
  # ║  Compiles, bundles, checks sizes. Runs after lint/type.     ║
  # ╚══════════════════════════════════════════════════════════════╝

  build:
    name: '3 · Build'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [lint, format, typecheck, circular, structure]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: ./.github/actions/setup-node
      - run: npm run build
      - run: npx size-limit
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: build-output
          path: dist/
          retention-days: 3

  # ╔══════════════════════════════════════════════════════════════╗
  # ║  STAGE 4 — Unit Tests                                       ║
  # ║  Parallel shards + coverage. Depends on build.              ║
  # ╚══════════════════════════════════════════════════════════════╝

  unit:
    name: '4 · Unit ${{ matrix.shard }}/2'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: ./.github/actions/setup-node
      - run: npx vitest run --shard=${{ matrix.shard }}/2
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: unit-results-${{ matrix.shard }}
          path: test-results/
          retention-days: 3
          if-no-files-found: ignore

  coverage:
    name: '4 · Coverage'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [build]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: ./.github/actions/setup-node
      - run: npm run test:coverage

  # ╔══════════════════════════════════════════════════════════════╗
  # ║  STAGE 5 — Integration Tests                                ║
  # ║  Heavy tier. Only on merge or "run-full-suite" label.       ║
  # ║  All jobs run in parallel after unit tests pass.            ║
  # ╚══════════════════════════════════════════════════════════════╝

  e2e:
    name: '5 · E2E ${{ matrix.shard }}/2'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [unit]
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-full-suite')
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: ./.github/actions/setup-node
      - run: npm run build
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test --project=chromium --shard=${{ matrix.shard }}/2
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: e2e-report-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore

  smoke:
    name: '5 · Smoke'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [unit]
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-full-suite')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: ./.github/actions/setup-node
      - run: npm run build
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test --project=smoke

  a11y:
    name: '5 · Accessibility'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [unit]
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-full-suite')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: ./.github/actions/setup-node
      - run: npm run build
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test --project=a11y-public
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: a11y-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore

  lighthouse:
    name: '5 · Lighthouse'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [build]
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-full-suite')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 20
      - uses: ./.github/actions/setup-node
      - run: npm run build
      - run: npx @lhci/cli autorun --config=lighthouserc.json
      - run: npx @lhci/cli autorun --config=lighthouserc.desktop.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 14
          if-no-files-found: ignore

  # ╔══════════════════════════════════════════════════════════════╗
  # ║  PIPELINE GATE                                              ║
  # ║  Single status check for branch protection.                 ║
  # ║  Skipped jobs (heavy tier off) don't block.                 ║
  # ╚══════════════════════════════════════════════════════════════╝

  ci-status:
    name: 'Pipeline Gate'
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      [
        lint,
        format,
        typecheck,
        circular,
        structure,
        build,
        unit,
        coverage,
        e2e,
        smoke,
        a11y,
        lighthouse,
      ]
    steps:
      - name: Evaluate pipeline
        run: |
          echo "────────────────────────────────────────"
          echo "  Pipeline Results"
          echo "────────────────────────────────────────"
          echo "  Stage 1  Lint:         ${{ needs.lint.result }}"
          echo "  Stage 1  Format:       ${{ needs.format.result }}"
          echo "  Stage 2  TypeCheck:    ${{ needs.typecheck.result }}"
          echo "  Stage 2  Circular:     ${{ needs.circular.result }}"
          echo "  Stage 2  Structure:    ${{ needs.structure.result }}"
          echo "  Stage 3  Build:        ${{ needs.build.result }}"
          echo "  Stage 4  Unit:         ${{ needs.unit.result }}"
          echo "  Stage 4  Coverage:     ${{ needs.coverage.result }}"
          echo "  Stage 5  E2E:          ${{ needs.e2e.result }}"
          echo "  Stage 5  Smoke:        ${{ needs.smoke.result }}"
          echo "  Stage 5  A11y:         ${{ needs.a11y.result }}"
          echo "  Stage 5  Lighthouse:   ${{ needs.lighthouse.result }}"
          echo "────────────────────────────────────────"

          FAILED=false
          for job in lint format typecheck circular structure build unit; do
            result="${{ needs[job].result }}"
            if [[ "$result" == "failure" ]]; then
              echo "FAIL: $job"
              FAILED=true
            fi
          done

          # Heavy tier only blocks if it actually ran
          for job in e2e smoke a11y; do
            result="${{ needs[job].result }}"
            if [[ "$result" == "failure" ]]; then
              echo "FAIL: $job"
              FAILED=true
            fi
          done

          if [[ "$FAILED" == "true" ]]; then
            echo ""
            echo "Pipeline FAILED"
            exit 1
          fi

          echo ""
          echo "Pipeline PASSED"
