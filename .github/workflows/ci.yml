name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

# ─────────────────────────────────────────────────────────────────
#  Pipeline Architecture
#
#  Stage 1 ─ Static Checks    (parallel with Build, ~45s)
#  Stage 2 ─ Build            (parallel with Static, ~60s)
#  Stage 3 ─ Unit Tests       (after build, parallel shards, ~60s)
#  Stage 4 ─ Integration Tests (after unit, heavy tier only)
#  Final   ─ Pipeline Gate     (evaluates all stages)
# ─────────────────────────────────────────────────────────────────

jobs:
  # ╔══════════════════════════════════════════════════════════════╗
  # ║  Stage 0 — Path Filtering                                   ║
  # ║  Skip full pipeline for docs/config-only changes.           ║
  # ╚══════════════════════════════════════════════════════════════╝

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: dorny/paths-filter@de90cc6fb38fc0963d785cfb794e4d0a540a50ed
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'public/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'vite.config.*'
              - 'vitest.config.*'
              - 'playwright.config.*'
              - '.github/workflows/**'
              - 'scripts/**'

  # ╔══════════════════════════════════════════════════════════════╗
  # ║  STAGE 1 — Static Checks                                   ║
  # ║  Lint, format, typecheck, circular deps, structure.         ║
  # ╚══════════════════════════════════════════════════════════════╝

  static-checks:
    name: '1 · Static Checks'
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: ./.github/actions/setup-node
      - name: Lint
        run: npm run lint
      - name: Format
        run: npm run format:check
      - name: Type Check
        run: npm run typecheck
      - name: Circular Dependencies
        run: npm run circular
      - name: Structure
        run: bash scripts/check-duplicates.sh

  # ╔══════════════════════════════════════════════════════════════╗
  # ║  STAGE 2 — Build                                            ║
  # ║  Compiles, bundles, checks sizes. Parallel with static.     ║
  # ╚══════════════════════════════════════════════════════════════╝

  build:
    name: '2 · Build'
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: ./.github/actions/setup-node
      - run: npm run build
      - run: npx size-limit
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: build-output
          path: dist/
          retention-days: 3

  # ╔══════════════════════════════════════════════════════════════╗
  # ║  STAGE 3 — Unit Tests                                       ║
  # ║  Parallel shards + coverage. Depends on build.              ║
  # ╚══════════════════════════════════════════════════════════════╝

  unit:
    name: '3 · Unit ${{ matrix.shard }}/2'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: ./.github/actions/setup-node
      - run: npx vitest run --shard=${{ matrix.shard }}/2
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: unit-results-${{ matrix.shard }}
          path: test-results/
          retention-days: 3
          if-no-files-found: ignore

  coverage:
    name: '3 · Coverage'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [build]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-node
      - run: npm run test:coverage
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBECLOUD }}

  # ╔══════════════════════════════════════════════════════════════╗
  # ║  STAGE 4 — Integration Tests                                ║
  # ║  Heavy tier. Only on merge or "run-full-suite" label.       ║
  # ║  All jobs run in parallel after unit tests pass.            ║
  # ╚══════════════════════════════════════════════════════════════╝

  e2e:
    name: '4 · E2E ${{ matrix.shard }}/2'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [unit]
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-full-suite')
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: ./.github/actions/setup-node
      - uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e
        with:
          name: build-output
          path: dist/
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - run: npx playwright test --project=chromium --shard=${{ matrix.shard }}/2 --retries=2
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: e2e-report-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore

  smoke:
    name: '4 · Smoke'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [unit]
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-full-suite')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: ./.github/actions/setup-node
      - uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e
        with:
          name: build-output
          path: dist/
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - run: npx playwright test --project=smoke --retries=2

  a11y:
    name: '4 · Accessibility'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [unit]
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-full-suite')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: ./.github/actions/setup-node
      - uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e
        with:
          name: build-output
          path: dist/
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - run: npx playwright test --project=a11y-public --retries=2
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: a11y-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore

  lighthouse:
    name: '4 · Lighthouse'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [build]
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-full-suite')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 20
      - uses: ./.github/actions/setup-node
      - uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e
        with:
          name: build-output
          path: dist/
      - run: npx @lhci/cli autorun --config=lighthouserc.json
      - run: npx @lhci/cli autorun --config=lighthouserc.desktop.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 14
          if-no-files-found: ignore

  # ╔══════════════════════════════════════════════════════════════╗
  # ║  PIPELINE GATE                                              ║
  # ║  Single status check for branch protection.                 ║
  # ║  Skipped jobs (heavy tier off) don't block.                 ║
  # ╚══════════════════════════════════════════════════════════════╝

  ci-status:
    name: 'Pipeline Gate'
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      [
        changes,
        static-checks,
        build,
        unit,
        coverage,
        e2e,
        smoke,
        a11y,
        lighthouse,
      ]
    steps:
      - name: Evaluate pipeline
        run: |
          echo "────────────────────────────────────────"
          echo "  Pipeline Results"
          echo "────────────────────────────────────────"
          echo "  Stage 1  Static Checks: ${{ needs.static-checks.result }}"
          echo "  Stage 2  Build:         ${{ needs.build.result }}"
          echo "  Stage 3  Unit:          ${{ needs.unit.result }}"
          echo "  Stage 3  Coverage:      ${{ needs.coverage.result }}"
          echo "  Stage 4  E2E:           ${{ needs.e2e.result }}"
          echo "  Stage 4  Smoke:         ${{ needs.smoke.result }}"
          echo "  Stage 4  A11y:          ${{ needs.a11y.result }}"
          echo "  Stage 4  Lighthouse:    ${{ needs.lighthouse.result }}"
          echo "────────────────────────────────────────"

          FAILED=false
          for job in static-checks build unit coverage; do
            result="${{ needs[job].result }}"
            if [[ "$result" == "failure" ]]; then
              echo "FAIL: $job"
              FAILED=true
            fi
          done

          # Heavy tier only blocks if it actually ran
          for job in e2e smoke a11y lighthouse; do
            result="${{ needs[job].result }}"
            if [[ "$result" == "failure" ]]; then
              echo "FAIL: $job"
              FAILED=true
            fi
          done

          if [[ "$FAILED" == "true" ]]; then
            echo ""
            echo "Pipeline FAILED"
            exit 1
          fi

          echo ""
          echo "Pipeline PASSED"
