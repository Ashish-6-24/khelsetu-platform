name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'

defaults:
  run:
    working-directory: khelsetu-frontend

jobs:
  # ─────────────────────────────────────────────
  # Stage 1: Validate (parallel)
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: ./.github/actions/setup-node
      - run: npm run lint

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: ./.github/actions/setup-node
      - run: npm run format:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: ./.github/actions/setup-node
      - run: npm run typecheck

  secrets:
    name: Secret Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  circular:
    name: Circular Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: ./.github/actions/setup-node
      - run: npm run circular

  duplicates:
    name: Structure Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - name: Check for duplicate/stale directories
        run: bash scripts/check-duplicates.sh

  # ─────────────────────────────────────────────
  # Stage 2: Build (depends on validate)
  # ─────────────────────────────────────────────
  build:
    name: Build & Bundle Size
    runs-on: ubuntu-latest
    needs: [lint, format, typecheck, secrets, circular, duplicates]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: ./.github/actions/setup-node
      - run: npm run build
      - run: npx size-limit
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: build-output
          path: khelsetu-frontend/dist/
          retention-days: 1

  # ─────────────────────────────────────────────
  # Stage 3: Unit Tests (depends on build)
  # ─────────────────────────────────────────────
  unit-test:
    name: Unit Tests (Shard ${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: ./.github/actions/setup-node
      - run: npx vitest run --shard=${{ matrix.shard }}/2

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: ./.github/actions/setup-node
      - run: npm run test:coverage

  # ─────────────────────────────────────────────
  # Stage 4: Integration (depends on unit tests)
  # ─────────────────────────────────────────────
  e2e:
    name: E2E Tests (Shard ${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    needs: [unit-test]
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: ./.github/actions/setup-node
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test --project=chromium --shard=${{ matrix.shard }}/2
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: e2e-report-shard-${{ matrix.shard }}
          path: khelsetu-frontend/playwright-report/
          retention-days: 14
          if-no-files-found: ignore

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: ./.github/actions/setup-node
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test --project=smoke

  a11y:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: ./.github/actions/setup-node
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test --project=a11y-public
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: a11y-report
          path: khelsetu-frontend/playwright-report/
          retention-days: 14
          if-no-files-found: ignore

  visual:
    name: Visual Regression
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: ./.github/actions/setup-node
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test --config=playwright.visual.config.ts
      - name: Upload diff
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: visual-regression-report
          path: |
            khelsetu-frontend/test-results/
            khelsetu-frontend/e2e/visual/snapshots/
          retention-days: 14
          if-no-files-found: ignore

  # ─────────────────────────────────────────────
  # Stage 5: Performance (depends on build)
  # ─────────────────────────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 20
      - uses: ./.github/actions/setup-node
      - run: npm run build
      - run: npx @lhci/cli autorun --config=lighthouserc.json
      - run: npx @lhci/cli autorun --config=lighthouserc.desktop.json
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: lighthouse-report
          path: khelsetu-frontend/.lighthouseci/
          retention-days: 14
          if-no-files-found: ignore
