name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  WORKING_DIR: .

defaults:
  run:
    working-directory: .

jobs:
  # ═══════════════════════════════════════════════
  #  STAGE 1 — Code Quality (parallel, no deps)
  # ═══════════════════════════════════════════════
  lint:
    name: 'Quality · Lint'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: ./.github/actions/setup-node
      - run: npm run lint

  format:
    name: 'Quality · Format'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: ./.github/actions/setup-node
      - run: npm run format:check

  typecheck:
    name: 'Quality · Type Check'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: ./.github/actions/setup-node
      - run: npm run typecheck

  # ═══════════════════════════════════════════════
  #  STAGE 2 — Security & Structure (parallel, no deps)
  # ═══════════════════════════════════════════════
  secrets:
    name: 'Security · Secrets'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  circular:
    name: 'Security · Circular Deps'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: ./.github/actions/setup-node
      - run: npm run circular

  structure:
    name: 'Security · Structure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Check for duplicate/stale directories
        run: bash scripts/check-duplicates.sh

  # ═══════════════════════════════════════════════
  #  STAGE 3 — Build (needs: quality + security)
  # ═══════════════════════════════════════════════
  build:
    name: 'Build'
    runs-on: ubuntu-latest
    needs: [lint, format, typecheck, secrets, circular, structure]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: ./.github/actions/setup-node
      - run: npm run build
      - run: npx size-limit
      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: build-output
          path: ${{ env.WORKING_DIR }}/dist/
          retention-days: 3

  # ═══════════════════════════════════════════════
  #  STAGE 4 — Unit Tests (needs: build)
  # ═══════════════════════════════════════════════
  unit-test:
    name: 'Unit · Shard ${{ matrix.shard }}/2'
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: ./.github/actions/setup-node
      - run: npx vitest run --shard=${{ matrix.shard }}/2 --reporter=basic
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: unit-results-shard-${{ matrix.shard }}
          path: ${{ env.WORKING_DIR }}/test-results/
          retention-days: 3
          if-no-files-found: ignore

  coverage:
    name: 'Unit · Coverage'
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: ./.github/actions/setup-node
      - run: npm run test:coverage

  # ═══════════════════════════════════════════════
  #  STAGE 5 — Integration Tests (needs: unit)
  # ═══════════════════════════════════════════════
  e2e:
    name: 'E2E · Shard ${{ matrix.shard }}/2'
    runs-on: ubuntu-latest
    needs: [unit-test]
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: ./.github/actions/setup-node
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test --project=chromium --shard=${{ matrix.shard }}/2
      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: e2e-report-shard-${{ matrix.shard }}
          path: ${{ env.WORKING_DIR }}/playwright-report/
          retention-days: 14
          if-no-files-found: ignore

  smoke:
    name: 'E2E · Smoke'
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: ./.github/actions/setup-node
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test --project=smoke

  a11y:
    name: 'E2E · Accessibility'
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: ./.github/actions/setup-node
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test --project=a11y-public
      - name: Upload a11y report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: a11y-report
          path: ${{ env.WORKING_DIR }}/playwright-report/
          retention-days: 14
          if-no-files-found: ignore

  visual:
    name: 'E2E · Visual Regression'
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: ./.github/actions/setup-node
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test --config=playwright.visual.config.ts
      - name: Upload visual diff
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: visual-regression-report
          path: |
            ${{ env.WORKING_DIR }}/test-results/
            ${{ env.WORKING_DIR }}/e2e/visual/snapshots/
          retention-days: 14
          if-no-files-found: ignore

  # ═══════════════════════════════════════════════
  #  STAGE 6 — Performance (needs: build)
  # ═══════════════════════════════════════════════
  lighthouse:
    name: 'Performance · Lighthouse'
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 20
      - uses: ./.github/actions/setup-node
      - run: npm run build
      - run: npx @lhci/cli autorun --config=lighthouserc.json
      - run: npx @lhci/cli autorun --config=lighthouserc.desktop.json
      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: lighthouse-report
          path: ${{ env.WORKING_DIR }}/.lighthouseci/
          retention-days: 14
          if-no-files-found: ignore

  # ═══════════════════════════════════════════════
  #  STAGE 7 — CI Status Gate (needs: ALL)
  # ═══════════════════════════════════════════════
  ci-status:
    name: 'CI Status'
    if: always()
    runs-on: ubuntu-latest
    needs:
      [
        lint, format, typecheck,
        secrets, circular, structure,
        build,
        unit-test, coverage,
        e2e, smoke, a11y, visual,
        lighthouse,
      ]
    steps:
      - name: Evaluate pipeline status
        run: |
          echo "Pipeline results:"
          echo "  lint:        ${{ needs.lint.result }}"
          echo "  format:      ${{ needs.format.result }}"
          echo "  typecheck:   ${{ needs.typecheck.result }}"
          echo "  secrets:     ${{ needs.secrets.result }}"
          echo "  circular:    ${{ needs.circular.result }}"
          echo "  structure:   ${{ needs.structure.result }}"
          echo "  build:       ${{ needs.build.result }}"
          echo "  unit-test:   ${{ needs.unit-test.result }}"
          echo "  coverage:    ${{ needs.coverage.result }}"
          echo "  e2e:         ${{ needs.e2e.result }}"
          echo "  smoke:       ${{ needs.smoke.result }}"
          echo "  a11y:        ${{ needs.a11y.result }}"
          echo "  visual:      ${{ needs.visual.result }}"
          echo "  lighthouse:  ${{ needs.lighthouse.result }}"

          # Fail if any critical job failed
          if [[ "${{ needs.lint.result }}" == "failure" ]] || \
             [[ "${{ needs.format.result }}" == "failure" ]] || \
             [[ "${{ needs.typecheck.result }}" == "failure" ]] || \
             [[ "${{ needs.secrets.result }}" == "failure" ]] || \
             [[ "${{ needs.circular.result }}" == "failure" ]] || \
             [[ "${{ needs.structure.result }}" == "failure" ]] || \
             [[ "${{ needs.build.result }}" == "failure" ]] || \
             [[ "${{ needs.unit-test.result }}" == "failure" ]] || \
             [[ "${{ needs.e2e.result }}" == "failure" ]] || \
             [[ "${{ needs.smoke.result }}" == "failure" ]]; then
            echo "❌ CI pipeline FAILED"
            exit 1
          fi

          echo "✅ CI pipeline PASSED"
