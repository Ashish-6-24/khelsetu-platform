name: Auto Approve Owner PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-approve:
    if: github.event.pull_request.user.login == 'Ashish-6-24'
    runs-on: ubuntu-latest
    steps:
      - name: Auto approve
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'APPROVE'
            });
            console.log(`Auto-approved PR #${context.payload.pull_request.number}`);

      - name: Enable auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            await github.graphql(`
              mutation($id: ID!, $method: PullRequestMergeMethod!) {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: $id,
                  mergeMethod: $method
                }) {
                  pullRequest { number autoMergeRequest { mergeMethod } }
                }
              }
            `, {
              id: context.payload.pull_request.node_id,
              method: 'SQUASH'
            });
            console.log(`Enabled auto-merge on PR #${context.payload.pull_request.number}`);
