name: Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    name: Dependabot Auto-Merge
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Approve PR
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge (bypass CI)
        run: gh pr merge --squash --auto "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  owner:
    name: Owner Auto-Merge
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.user.login == 'Ashish-6-24' &&
      github.event.pull_request.base.ref == 'master'
    steps:
      - name: Enable auto-merge (waits for CI)
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  comment-on-failure:
    name: Comment on CI Failure
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      github.event.pull_request.user.login != 'Ashish-6-24'
    steps:
      - name: Wait for CI
        run: sleep 300

      - name: Check CI status
        id: ci
        run: |
          STATUS=$(gh pr checks ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json conclusion --jq '.[0].conclusion')
          echo "status=$STATUS" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment if CI failed
        if: steps.ci.outputs.status == 'failure'
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} \
            --body "⚠️ **CI Failed**\n\nPlease fix the failing checks and push again. An owner review is required to merge."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
